# All service-to-service URLs use docker service names.
# Postgres is NOT managed here — point DATABASE_URL in .env at your existing instance.
# From inside Docker containers, use host.docker.internal instead of localhost:
#   DATABASE_URL=postgresql+psycopg://user:pass@host.docker.internal:5432/reglens

services:
  # ---------------------------------------------------------------------------
  # Database migrations (run once then exit)
  migrate:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: reglens-migrate
    command: uv run alembic upgrade head
    env_file: .env
    restart: "no"

  # ---------------------------------------------------------------------------
  # FastAPI service
  reglens-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: reglens-api
    restart: unless-stopped
    command: uv run uvicorn reglens.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      A2A_INGESTION_URL: http://reglens-adk-ingest:8001
      A2A_RISK_SCORER_URL: http://reglens-adk-risk:8002
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads

  # ---------------------------------------------------------------------------
  # LangGraph supervisor service
  reglens-langgraph:
    build:
      context: .
      dockerfile: docker/langgraph.Dockerfile
    container_name: reglens-langgraph
    restart: unless-stopped
    command: uv run python -m reglens.supervisor.server
    ports:
      - "8010:8010"
    env_file: .env
    environment:
      A2A_INGESTION_URL: http://reglens-adk-ingest:8001
      A2A_RISK_SCORER_URL: http://reglens-adk-risk:8002
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src

  # ---------------------------------------------------------------------------
  # ADK Document Ingestion agent (A2A server, port 8001)
  reglens-adk-ingest:
    build:
      context: .
      dockerfile: docker/adk.Dockerfile
    container_name: reglens-adk-ingest
    restart: unless-stopped
    command: uv run python -m reglens.agents.ingestion.server
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      ADK_AGENT_PORT: "8001"
      ADK_AGENT_NAME: "document-ingestion"
    volumes:
      - ./src:/app/src

  # ---------------------------------------------------------------------------
  # ADK Risk Scorer agent (A2A server, port 8002)
  reglens-adk-risk:
    build:
      context: .
      dockerfile: docker/adk.Dockerfile
    container_name: reglens-adk-risk
    restart: unless-stopped
    command: uv run python -m reglens.agents.risk_scorer.server
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      ADK_AGENT_PORT: "8002"
      ADK_AGENT_NAME: "risk-scorer"
    volumes:
      - ./src:/app/src
