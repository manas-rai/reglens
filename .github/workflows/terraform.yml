name: terraform

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"

permissions:
  id-token: write
  contents: read

# One terraform run at a time, across all branches: plans against a stack
# mid-apply are noise, and applies must never overlap.
concurrency:
  group: terraform
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1

defaults:
  run:
    working-directory: infra/terraform

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.14"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/reglens-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init
        run: |
          cat > backend.hcl <<EOF
          bucket       = "reglens-tfstate-${{ vars.AWS_ACCOUNT_ID }}"
          key          = "demo/terraform.tfstate"
          region       = "${{ env.AWS_REGION }}"
          use_lockfile = true
          EOF
          terraform init -input=false -backend-config=backend.hcl

      - name: Validate
        run: terraform validate

      - name: Plan
        run: terraform plan -input=false -no-color

  # Waits for manual approval via the aws-demo environment's required
  # reviewers before touching real infrastructure. Re-plans rather than
  # consuming a saved plan artifact: this is a public repo, and artifacts
  # are world-downloadable while plan files can embed sensitive values.
  apply:
    if: github.event_name == 'push'
    needs: plan
    runs-on: ubuntu-latest
    environment: aws-demo
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.14"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/reglens-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Init
        run: |
          cat > backend.hcl <<EOF
          bucket       = "reglens-tfstate-${{ vars.AWS_ACCOUNT_ID }}"
          key          = "demo/terraform.tfstate"
          region       = "${{ env.AWS_REGION }}"
          use_lockfile = true
          EOF
          terraform init -input=false -backend-config=backend.hcl

      - name: Apply
        run: terraform apply -input=false -auto-approve
