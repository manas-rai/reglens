name: images

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "docker/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/images.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - repo: reglens/api
            dockerfile: docker/api.Dockerfile
          - repo: reglens/langgraph
            dockerfile: docker/langgraph.Dockerfile
          - repo: reglens/adk
            dockerfile: docker/adk.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/reglens-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ matrix.repo }}"
          docker build -f "${{ matrix.dockerfile }}" \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" \
            .
          docker push --all-tags "$IMAGE"
