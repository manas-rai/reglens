name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src/reglens

      - name: Unit tests
        run: uv run pytest tests/unit -v --tb=short

  evals:
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --extra dev

      # Offline component evals — deterministic stubs, no API keys required.
      - name: Component evals (offline)
        run: |
          uv run python -m evals.component.routing_eval
          uv run python -m evals.component.ingestion_eval
          uv run python -m evals.component.rag_eval
          uv run python -m evals.component.gap_eval
          uv run python -m evals.component.risk_eval

      # Behavioral guardrail tests — competency, invariance, monotonicity, counterfactual.
      - name: Behavioral evals (offline)
        run: |
          uv run python -m evals.behavioral.competency
          uv run python -m evals.behavioral.invariance
          uv run python -m evals.behavioral.monotonicity
          uv run python -m evals.behavioral.counterfactual

      # End-to-end pipeline scenarios — aggregate gap + severity metrics.
      - name: End-to-end scenarios (offline)
        run: |
          uv run python -m evals.end_to_end.scenarios

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/api.Dockerfile -t reglens-api:ci .

      - name: Build ADK image
        run: docker build -f docker/adk.Dockerfile -t reglens-adk:ci .

      - name: Build LangGraph image
        run: docker build -f docker/langgraph.Dockerfile -t reglens-langgraph:ci .
